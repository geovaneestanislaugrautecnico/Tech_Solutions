<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Solutions | Contato</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://googleapis.com" />
</head>
<body>

    <header class="container">
        <div class="logo">
            <h1>Tech Solutions</h1>
        </div>
        <nav>
            <ul class="menu">
                <li><a href="index.html">Início</a></li>
                <li><a href="contato.html" class="ativo">Contato</a></li>
            </ul>
        </nav>
    </header>

    <!-- FORMULÁRIO DE CONTATO -->
    <section class="contato-secao container">
        <h2>Entre em Contato</h2>
        <p>Preencha o formulário abaixo e em breve retornaremos.</p>

        <!-- Adicionando um ID para referenciar no JavaScript -->
        <form id="formContato">
            <div class="form-grupo">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
            </div>

            <div class="form-grupo">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="seu.email@exemplo.com" required>
            </div>

            <div class="form-grupo">
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" placeholder="(XX) 9XXXX-XXXX" required>
            </div>

            <div class="form-grupo">
                <label for="assunto">Assunto:</label>
                <select id="assunto" name="assunto" required>
                    <option value="" disabled selected>Selecione uma opção</option>
                    <option value="web">Desenvolvimento Web</option>
                    <option value="redes">Redes</option>
                    <option value="suporte">Suporte Técnico</option>
                    <option value="consultoria">Consultoria</option>
                </select>
            </div>

            <div class="form-grupo">
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="5" placeholder="Digite sua mensagem aqui..." required></textarea>
            </div>

            <div class="form-botoes">
                <button type="submit" class="botao">Enviar Mensagem</button>
                <button type="reset" class="botao-reset">Limpar</button>
            </div>
        </form>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Tech Solutions. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
